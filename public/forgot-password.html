<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - InteriorAI</title>
    <link href="./output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- i18next -->
    <script src="https://unpkg.com/i18next@21.6.3/dist/umd/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@1.3.1/i18nextHttpBackend.min.js"></script>
    <script src="./js/i18n.js"></script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased h-screen flex items-center justify-center">
    <div
        class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-100 dark:border-gray-700">
        <div class="text-center mb-8">
            <a href="/" class="inline-block mb-4">
                <img src="./logo.png" alt="InteriorAI Logo" class="h-12 w-auto mx-auto">
            </a>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white" data-i18n="auth.resetPassword">Reset Password
            </h2>
            <p class="text-gray-600 dark:text-gray-400" data-i18n="auth.enterEmail">Enter your email to receive
                instructions</p>
        </div>

        <form id="forgotForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                    data-i18n="auth.emailLabel">Email
                    Address</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
            </div>

            <button type="submit" data-i18n="auth.sendResetLink"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition shadow-lg shadow-indigo-500/30">Send
                Reset Link</button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
            <span data-i18n="auth.rememberPassword">Remember your password?</span> <a href="/login.html"
                data-i18n="auth.signInLink"
                class="font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">Sign in</a>
        </p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                alert(result.message);
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            }
        });
    </script>
</body>

</html>
